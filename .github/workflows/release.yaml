name: Release

on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+*

permissions:
  contents: write

defaults:
  run:
    shell: bash

env:
  CARGO_TERM_COLOR: always

jobs:
  check-tag:
    runs-on: ubuntu-latest
    outputs:
      rc: ${{ steps.check.outputs.rc }}
    steps:
      - name: Check Tag
        id: check
        run: |
          ver=${GITHUB_REF##*/}
          if [[ "$ver" =~ [0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "rc=false" >> "$GITHUB_OUTPUT"
            echo "version=$ver" >> "$GITHUB_OUTPUT"
          else
            echo "rc=true" >> "$GITHUB_OUTPUT"
            echo "version=$ver" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-tag
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies (Tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build and upload Tauri app
        uses: tauri-apps/tauri-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SimpleMusicPlayer ${{ github.ref_name }}"
          releaseBody: |
            ## SimpleMusicPlayer ${{ github.ref_name }}

            ### Installation
            Download the appropriate installer for your platform from the assets below.

            > For the full changelog, see the commits since the previous release.
          releaseDraft: false
          prerelease: ${{ needs.check-tag.outputs.rc == 'true' }}
